<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクセスQRコード</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a1a2e;color:#e2e8f0;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .container{background:#16213e;border-radius:16px;padding:48px 40px;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    h1{font-size:1.4rem;margin-bottom:8px}
    p{color:#94a3b8;font-size:.85rem;margin-bottom:24px}
    #qr{display:inline-block;background:#fff;padding:16px;border-radius:12px;margin-bottom:20px}
    .url{background:#0f172a;padding:12px 16px;border-radius:8px;font-size:.75rem;color:#6366f1;word-break:break-all;margin-bottom:16px}
    .note{color:#64748b;font-size:.75rem;line-height:1.6}
    .key-info{background:#0f172a;padding:12px 16px;border-radius:8px;margin-bottom:20px}
    .key-info span{color:#f59e0b;font-weight:500;font-size:1.1rem;letter-spacing:.1em}
    .key-label{color:#94a3b8;font-size:.8rem;display:block;margin-bottom:4px}
  </style>
</head>
<body>
  <div class="container">
    <h1>岡本直也様邸 仕様ビジュアライザー</h1>
    <p>このQRコードをスキャンするとアプリにアクセスできます</p>
    <div id="qr"></div>
    <div class="url" id="url"></div>
    <div class="key-info">
      <span class="key-label">手動入力用アクセスキー</span>
      <span>okamoto2026</span>
    </div>
    <p class="note">※ このQRコードにはアクセスキーが含まれています。<br>共有する相手にご注意ください。</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    var url = 'https://naokam.github.io/house-spec/?key=okamoto2026';
    document.getElementById('url').textContent = url;
    var qr = qrcode(0, 'M');
    qr.addData(url);
    qr.make();
    document.getElementById('qr').innerHTML = qr.createSvgTag(6, 0);
  </script>
</body>
</html>
