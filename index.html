<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東玉川2丁目 注文住宅仕様ビジュアライザー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- サイドバー -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="project-icon">邸</div>
      <div class="project-title">
        <span class="project-name">岡本直也様邸</span>
        <span class="project-sub">東玉川2丁目</span>
      </div>
    </div>
    <ul class="nav-list">
      <li><a href="#dashboard" class="nav-item active" data-view="dashboard" data-tip="ダッシュボード">
        <span class="nav-icon">&#9632;</span><span class="nav-label">ダッシュボード</span></a></li>
      <li><a href="#floorplan" class="nav-item" data-view="floorplan" data-tip="平面図">
        <span class="nav-icon">&#9633;</span><span class="nav-label">平面図</span></a></li>
      <li><a href="#section" class="nav-item" data-view="section" data-tip="断面図">
        <span class="nav-icon">&#9650;</span><span class="nav-label">断面図</span></a></li>
      <li><a href="#specs" class="nav-item" data-view="specs" data-tip="仕様一覧">
        <span class="nav-icon">&#9776;</span><span class="nav-label">仕様一覧</span></a></li>
      <li><a href="#gallery" class="nav-item" data-view="gallery" data-tip="CGギャラリー">
        <span class="nav-icon">&#9634;</span><span class="nav-label">CGギャラリー</span></a></li>
      <li><a href="#cost" class="nav-item" data-view="cost" data-tip="コスト分析">
        <span class="nav-icon">&#165;</span><span class="nav-label">コスト分析</span></a></li>
    </ul>
  </nav>

  <!-- モバイルヘッダー -->
  <header class="mobile-header">
    <button id="menu-toggle" class="menu-toggle" aria-label="メニュー">&#9776;</button>
    <span class="mobile-title">岡本直也様邸</span>
  </header>

  <!-- メインコンテンツ -->
  <main id="main-content" class="main-content">
    <div id="view-dashboard" class="view active"></div>
    <div id="view-floorplan" class="view"></div>
    <div id="view-section" class="view"></div>
    <div id="view-specs" class="view"></div>
    <div id="view-gallery" class="view"></div>
    <div id="view-cost" class="view"></div>
  </main>

  <!-- ライトボックス -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" aria-label="閉じる">&times;</button>
    <button class="lb-prev" aria-label="前へ">&#10094;</button>
    <button class="lb-next" aria-label="次へ">&#10095;</button>
    <div class="lb-content">
      <img id="lb-img" src="" alt="">
    </div>
    <div class="lb-caption" id="lb-caption"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/floorplan.js"></script>
  <script src="js/section.js"></script>
  <script src="js/specs.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
